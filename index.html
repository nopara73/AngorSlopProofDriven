<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Angor | Redirecting</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex">
    <meta name="color-scheme" content="light">
    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(129, 140, 248, 0.16), transparent 30%),
          linear-gradient(180deg, #f9fbff 0%, #eef4ff 42%, #f7f9fc 100%);
        color: #0f172a;
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.78);
        box-shadow: 0 24px 80px rgba(65, 86, 147, 0.15);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 0.98;
        letter-spacing: -0.06em;
      }

      p {
        margin-top: 14px;
        color: #42526b;
        line-height: 1.7;
      }

      a {
        color: #1d39c4;
      }
    </style>
    <script>
      (function () {
        var version = "20260416b";
        var page = "landing-20260416.html";
        var target = page + "?v=" + encodeURIComponent(version) + window.location.hash;

        if (
          window.location.pathname.endsWith("/" + page) ||
          window.location.pathname.endsWith(page)
        ) {
          return;
        }

        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>Loading the latest Angor landing page.</h1>
      <p>
        If you are not redirected automatically, open
        <a href="landing-20260416.html?v=20260416b">the latest version</a>.
      </p>
    </main>
  </body>
</html>
